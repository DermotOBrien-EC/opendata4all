name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  schema-validation:
    name: Schema validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check validation script syntax
        run: |
          node --check scripts/check-schemas.mjs
          node --check scripts/check-examples.mjs
          node --check scripts/check-repo-secrets.mjs
          node --check scripts/check-cli.mjs
          node --check scripts/check-policy-templates.mjs
          node --check bin/od4a.mjs

      - name: Validate project fixtures
        run: npm run validate
